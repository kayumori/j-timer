<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジャーナリングタイマー</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f8fafc;
            padding: 20px;
        }

        .jt-card {
            background: #ffffff;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 1rem 1.75rem;
            display: flex;
            align-items: center;
            gap: 1.75rem;
            transition: background 2s ease;
            width: 100%;
            max-width: 680px;
        }

        .jt-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: conic-gradient(#6366f1 0deg, #e2e8f0 0deg);
        }

        .jt-inner {
            width: 60px;
            height: 60px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .jt-time {
            font-size: 16px;
            font-weight: 500;
            color: #1e293b;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        .jt-mid {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            min-width: 0;
        }

        .jt-phase {
            font-size: 11px;
            color: #64748b;
            line-height: 1.4;
        }

        .jt-divider {
            width: 1px;
            height: 24px;
            background: rgba(148, 163, 184, 0.3);
            flex-shrink: 0;
        }

        .jt-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .jt-sel {
            display: flex;
            align-items: center;
            gap: 5px;
            transition: opacity 0.3s;
        }

        .jt-label {
            font-size: 11px;
            color: #64748b;
            white-space: nowrap;
        }

        .jt-input {
            width: 44px;
            font-size: 12px;
            text-align: center;
            padding: 3px 5px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            border-radius: 5px;
            background: #f8fafc;
            color: #1e293b;
            font-family: inherit;
        }

        .jt-input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .jt-start {
            background: #1e293b;
            color: #f8fafc;
            border: none;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 18px;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.15s, transform 0.1s;
            white-space: nowrap;
        }

        .jt-start:hover { opacity: 0.82; }
        .jt-start:active { transform: scale(0.97); }

        .jt-mini {
            background: none;
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 5px;
            font-size: 11px;
            color: #64748b;
            padding: 4px 9px;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            transition: background 0.15s;
        }

        .jt-mini:hover { background: #f8fafc; }
    </style>
</head>
<body>

<div class="jt-card" id="jt-card">

    <div class="jt-ring" id="jt-ring">
        <div class="jt-inner">
            <span class="jt-time" id="jt-time">10:00</span>
        </div>
    </div>

    <div class="jt-mid">
        <div class="jt-phase" id="jt-phase">深呼吸をして準備を整えましょう</div>
    </div>

    <div class="jt-divider"></div>

    <div class="jt-right">
        <div class="jt-sel" id="jt-sel">
            <input type="number" class="jt-input" id="jt-input" value="10" min="1" max="60" onchange="jtUpdate()">
            <span class="jt-label">分</span>
        </div>
        <button class="jt-start" onclick="jtStart()">スタート</button>
        <button class="jt-mini" onclick="jtStop()">ストップ</button>
        <button class="jt-mini" onclick="jtReset()">リセット</button>
    </div>

</div>

<script>
    let jt_iv, jt_rem = 600, jt_run = false, jt_total = 600;
    const $ = id => document.getElementById(id);

    function jtFmt(s) { return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }

    function jtUpdate() {
        if (!jt_run) { jt_total = (parseInt($('jt-input').value) || 10) * 60; jt_rem = jt_total; jtDraw(); }
    }

    function jtDraw() {
        $('jt-time').textContent = jtFmt(jt_rem);
        const deg = ((jt_total - jt_rem) / jt_total) * 360;
        $('jt-ring').style.background = 'conic-gradient(#6366f1 ' + deg + 'deg, #e2e8f0 ' + deg + 'deg)';
        jtPhase();
    }

    function jtPhase() {
        const p = (jt_total - jt_rem) / jt_total;
        jtBg(p);
        if (!jt_run) return;
        $('jt-phase').textContent = ['心を静めて、思考を整理しましょう', '自由に思考を流れるままに表現してください', '深い洞察や気づきを大切に記録しましょう', 'もうすぐ完了です。最後の思考をまとめましょう'][p < 0.25 ? 0 : p < 0.5 ? 1 : p < 0.75 ? 2 : 3];
    }

    function lerp(c1, c2, f) {
        const h1 = c1.replace('#', ''), h2 = c2.replace('#', '');
        return '#' + [0, 2, 4].map(i => {
            const v = Math.round(parseInt(h1.substr(i, 2), 16) + (parseInt(h2.substr(i, 2), 16) - parseInt(h1.substr(i, 2), 16)) * f);
            return v.toString(16).padStart(2, '0');
        }).join('');
    }

    function jtBg(p) {
        let t, b;
        if (p <= 0.33) { const lp = p / 0.33; t = lerp('#f8fafc', '#f0f9ff', lp); b = lerp('#e2e8f0', '#e0f2fe', lp); }
        else if (p <= 0.66) { const lp = (p - 0.33) / 0.33; t = lerp('#f0f9ff', '#fffbeb', lp); b = lerp('#e0f2fe', '#fef3c7', lp); }
        else { const lp = (p - 0.66) / 0.34; t = lerp('#fffbeb', '#f0fdf4', lp); b = lerp('#fef3c7', '#dcfce7', lp); }
        document.body.style.background = 'linear-gradient(135deg,' + t + ' 0%,' + b + ' 100%)';
        $('jt-card').style.background = 'rgba(255,255,255,0.85)';
    }

    function jtStart() {
        if (!jt_run) {
            jt_run = true;
            $('jt-input').disabled = true;
            const s = $('jt-sel'); s.style.opacity = '0.35'; s.style.pointerEvents = 'none';
            jt_iv = setInterval(() => { jt_rem--; jtDraw(); if (jt_rem <= 0) jtComplete(); }, 1000);
            jtPhase();
        }
    }

    function jtStop() {
        if (jt_run) {
            jt_run = false;
            clearInterval(jt_iv);
            $('jt-phase').textContent = '一時停止中 — スタートで再開';
        }
    }

    function jtReset() {
        jt_run = false; clearInterval(jt_iv);
        $('jt-input').disabled = false;
        const s = $('jt-sel'); s.style.opacity = '1'; s.style.pointerEvents = 'auto';
        jt_total = (parseInt($('jt-input').value) || 10) * 60; jt_rem = jt_total;
        jtDraw();
        $('jt-phase').textContent = '深呼吸をして準備を整えましょう';
        document.body.style.background = '#f8fafc';
        $('jt-card').style.background = '#ffffff';
    }

    function jtComplete() {
        jt_run = false; clearInterval(jt_iv);
        $('jt-phase').textContent = 'お疲れさまでした。素晴らしいジャーナリングでした';
        const s = $('jt-sel'); s.style.opacity = '1'; s.style.pointerEvents = 'auto';
        $('jt-input').disabled = false;
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            [440, 523.25, 659.25, 783.99].forEach((f, i) => {
                const o = ctx.createOscillator(), g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.setValueAtTime(f, ctx.currentTime); o.type = 'sine';
                const d = i * 0.15, v = 0.08 - i * 0.015;
                g.gain.setValueAtTime(0, ctx.currentTime + d);
                g.gain.linearRampToValueAtTime(v, ctx.currentTime + d + 0.2);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d + 2.5);
                o.start(ctx.currentTime + d); o.stop(ctx.currentTime + d + 2.5);
            });
        } catch (e) {}
    }

    jtDraw();
</script>

</body>
</html>
